    const root = document.getElementById('days-root');
    let currentLang = 'en';
    function escapeText(value){return String(value).replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[char]));}
    function splitTagline(value){const parts=value.split(' ');return [parts.slice(0,-2).join(' '),parts.slice(-2).join(' ')];}
    function renderPage(lang){
      const data = DAYS_PAGE[lang] || DAYS_PAGE.en;
      const [headline, highlight] = splitTagline(data.tagline);
      document.documentElement.lang = lang;
      document.documentElement.dataset.theme = 'dark';
      try{localStorage.setItem('days-theme','dark');localStorage.setItem('app-template-theme','dark');}catch(e){}
      document.title = `${data.appName} - ${data.tagline}`;
      document.querySelectorAll('[data-app-name]').forEach(el=>{el.textContent=data.appName;});
      document.querySelector('[data-app-footer]').textContent=data.footerDescription;
      document.querySelector('[data-app-copy]').textContent=data.copyright;
      document.querySelectorAll('[data-i18n]').forEach(el=>{
        const path=el.dataset.i18n.split('.');
        let value=data;
        path.forEach(key=>{value=value?.[key];});
        if(value) el.textContent=value;
      });
      document.querySelectorAll('[data-lang]').forEach(btn=>btn.classList.toggle('active',btn.dataset.lang===lang));
      root.innerHTML = `
        <section class="hero">
          <div class="container hero-grid">
            <div class="hero-copy">
              <div class="app-kicker reveal">
                <div class="app-icon" aria-hidden="true"></div>
                <div><span class="badge-pill"><span class="dot"></span>${escapeText(data.badge)}</span><p class="app-label">${escapeText(data.appName)}</p></div>
              </div>
              <h1 class="hero-h1 reveal">${escapeText(headline)}<br><span class="grad-text">${escapeText(highlight)}</span></h1>
              <p class="hero-sub reveal">${escapeText(data.description)}</p>
              <div class="hero-actions reveal"><a href="${escapeText(data.storeUrl)}" class="btn btn-primary">${escapeText(data.primaryCta)}</a><a href="#features" class="btn btn-ghost">${escapeText(data.secondaryCta)}</a></div>
              <div class="hero-points reveal">${data.heroTags.map(tag=>`<span class="tag">${escapeText(tag)}</span>`).join('')}</div>
            </div>
            <div class="device-wrap reveal" aria-label="Days app preview">
              <div class="device-halo"></div>
              <div class="phone"><div class="phone-screen">
                <img src="/assets/projects/days_preview.png" alt="Days travel app preview" width="520" height="520">
                <div class="map-card"><div class="mock-row"><span class="tag">Barcelona</span><span class="tag">Tokyo</span></div><div class="map-route"></div></div>
                <div class="mock-row"><div class="mock-stat"><div class="mock-num">73</div><div class="mock-label">days abroad</div></div><div class="mock-stat"><div class="mock-num">12</div><div class="mock-label">countries</div></div></div>
              </div></div>
            </div>
          </div>
        </section>
        <section id="features"><div class="container"><div class="sec-head reveal"><span class="sec-pre">// Features</span><h2 class="sec-h2">${escapeText(data.featuresTitle)}</h2><p class="sec-sub">${escapeText(data.featuresSubtitle)}</p></div><div class="features-grid">${data.features.map(item=>`<article class="card reveal"><div class="feature-icon">${escapeText(item.icon)}</div><h3 class="card-title">${escapeText(item.title)}</h3><p class="card-text">${escapeText(item.text)}</p></article>`).join('')}</div></div></section>
        <section id="preview"><div class="container"><div class="sec-head reveal"><span class="sec-pre">// Preview</span><h2 class="sec-h2">${escapeText(data.previewTitle)}</h2><p class="sec-sub">${escapeText(data.previewSubtitle)}</p></div><div class="shots-grid">${data.screenshots.map((label,index)=>`<article class="shot ${index===0?'large':''} reveal"><div class="shot-screen"><span class="shot-bar" style="width:${index===0?'46':'58'}%"></span><span class="shot-block"></span><span class="shot-bar" style="width:72%;opacity:.45"></span><span class="shot-bar" style="width:54%;opacity:.28"></span></div><p class="shot-caption">${escapeText(label)}</p></article>`).join('')}</div></div></section>
        <section id="how-it-works"><div class="container"><div class="sec-head reveal"><span class="sec-pre">// Flow</span><h2 class="sec-h2">${escapeText(data.stepsTitle)}</h2><p class="sec-sub">${escapeText(data.stepsSubtitle)}</p></div><div class="steps-grid">${data.steps.map((step,index)=>`<article class="card reveal"><div class="step-num">${String(index+1).padStart(2,'0')}</div><h3 class="card-title">${escapeText(step.title)}</h3><p class="card-text">${escapeText(step.text)}</p></article>`).join('')}</div></div></section>
        <section id="apple"><div class="container"><div class="sec-head reveal"><span class="sec-pre">// Apple devices</span><h2 class="sec-h2">${escapeText(data.appleTitle)}</h2><p class="sec-sub">${escapeText(data.appleSubtitle)}</p></div><div class="apple-grid">${data.apple.map(item=>`<article class="card reveal"><h3 class="card-title">${escapeText(item.title)}</h3><p class="card-text">${escapeText(item.text)}</p></article>`).join('')}</div></div></section>
        <section id="pricing"><div class="container"><div class="sec-head reveal" style="text-align:center"><span class="sec-pre">// Pricing</span><h2 class="sec-h2">${escapeText(data.pricingTitle)}</h2><p class="sec-sub" style="margin:0 auto">${escapeText(data.pricingSubtitle)}</p></div><div class="pricing-grid">${data.pricing.map(plan=>`<article class="card price-card ${plan.featured?'featured':''} reveal">${plan.featured?'<span class="price-popular">Best value</span>':''}<div><h3 class="card-title">${escapeText(plan.name)}</h3><p class="card-text">${escapeText(plan.text)}</p></div><div><div class="price-amount ${plan.featured?'grad-text':''}">${escapeText(plan.price)}</div><p class="price-note">${escapeText(plan.note)}</p></div><div class="price-divider"></div>${plan.features.map(feature=>`<p class="price-feature">${escapeText(feature)}</p>`).join('')}<a href="${escapeText(data.storeUrl)}" class="btn ${plan.featured?'btn-primary':'btn-ghost'}" style="width:100%">${escapeText(plan.cta)}</a></article>`).join('')}</div></div></section>
        <section id="faq"><div class="container"><div class="sec-head reveal"><span class="sec-pre">// FAQ</span><h2 class="sec-h2">${escapeText(data.faqTitle)}</h2><p class="sec-sub">${escapeText(data.faqSubtitle)}</p></div><div class="faq-list">${data.faq.map((item,index)=>`<details class="reveal" ${index===0?'open':''}><summary>${escapeText(item.q)}</summary><p>${escapeText(item.a)}</p></details>`).join('')}</div></div></section>
        <section class="final-cta" id="download"><div class="cta-inner"><span class="badge-pill reveal"><span class="dot"></span>${escapeText(data.badge)}</span><h2 class="cta-h2 reveal">${escapeText(data.finalTitle)}</h2><p class="sec-sub reveal" style="text-align:center">${escapeText(data.finalText)}</p><a href="${escapeText(data.storeUrl)}" class="btn btn-primary reveal">${escapeText(data.primaryCta)}</a></div></section>
      `;
      reveal();
    }
    function reveal(){
      const items=document.querySelectorAll('.reveal');
      if(window.matchMedia('(prefers-reduced-motion:reduce)').matches){items.forEach(item=>item.classList.add('in'));return;}
      const observer=new IntersectionObserver(entries=>{entries.forEach(entry=>{if(!entry.isIntersecting)return;entry.target.classList.add('in');observer.unobserve(entry.target);});},{threshold:.08});
      items.forEach(item=>observer.observe(item));
    }
    document.querySelectorAll('[data-lang]').forEach(btn=>btn.addEventListener('click',()=>{currentLang=btn.dataset.lang;try{localStorage.setItem('days-lang',currentLang);}catch(e){}renderPage(currentLang);}));
    try{const saved=localStorage.getItem('days-lang');currentLang=DAYS_PAGE[saved]?saved:'en';}catch(e){currentLang='en';}
    renderPage(currentLang);
  </script>
